<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HOME PRACTICE TO FORM</title>
    <style>
        body {
            background-color: aquamarine;
        }

        form {
            background-color: white;
            width: 500px;
            margin-left: auto;
            margin-right: auto;


        }

        h1 {
            text-align: center;
        }

        label,
        input {
            margin-left: 25px;
        }

        #btn{
            background-color: blue;
            color: white;
        }

    </style>
</head>

<body>

    <form action="">
        <h1>Course Apply</h1>

        <label for="">Name*</label>
        <br>
        <input type="text">
        <br> <br>

        <label for="">Email*</label>
        <br>
        <input type="email">
        <br> <br>

        <label for="">Roll No*</label>
        <br>
        <input type="number">
        <br> <br>

        <label for="">Hall*</label>
        <br>
        <input type="text">
        <br> <br>

        <label for="">Mobile number*</label>
        <br>
        <input type="number">
        <br> <br>

        <label for="">Choose To One of The Course*:</label>
        <br>
        <input type="checkbox">Web Development
        <br>
        <input type="checkbox">AI Editing
        <br>
        <input type="checkbox">Digital Markiting
        <br> <br>

        <label for="">How urgently do you need it?*</label>
        <br>
        <input type="checkbox">1 Week
        <br>
        <input type="checkbox">1 month
        <br>
        <input type="checkbox">1 year
        <br>    <br>
        <input type="submit" id="btn" width="20px">
    </form>


</body>

</html>
