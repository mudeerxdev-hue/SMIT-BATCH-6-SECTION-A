<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Price list</title>
    <style>
        table, th{
            margin: auto;
            margin-left: auto;
            margin-right: auto;
        }
        h1{
            text-align: center;
        }
    </style>
</head>
<body>
    
    <h1>ElectroMart-Product Price list</h1>

    <table border="1" cellpadding="10" cellspacing="0">
        <thead>
            <tr>
                <th colspan="4">ElectroMart-Product Price list</th>
            </tr>
        <tr>
        <th>Product</th>
        <th>Category</th>
        <th>Price</th>
        <th>Stock</th>
        </tr>
        </thead>
        <tbody>
  <tr>
            <td>Sumsung</td>
            <td rowspan="2">Mobile</td>
            <td>$400</td>
            <td>Yes</td>
        </tr>
        <tr>
            <td>Iphone</td>
            <td>$768</td>
            <td>No</td>
        </tr>
        <tr>
            <td>HP Laptop</td>
            <td rowspan="2">Laptop</td>
            <td>$600</td>
            <td>Yes</td>
        </tr>
        <tr>
            <td>Macbook pro</td>
            <td>$800</td>
            <td>No</td>
        </tr>
        </tbody>
        <tfoot>
            <tr>
                <td colspan="4"><strong>Total Product 4</strong></td>
            </tr>
        </tfoot>
    </table>

</body>
</html>
